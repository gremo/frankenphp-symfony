schemaVersion: 2.0.0

commandTests:
  - name: Brotli
    command: brotli
    args: ['-V']

  - name: Supervisor
    command: supervisord
    args: ['-v']

  - name: Zstandard
    command: zstd
    args: ['-V']

  - name: Git
    command: git
    args: ['-v']

  - name: GnuPG
    command: gpg
    args: ['--version']

  - name: OpenSSH
    command: ssh
    args: ['-V']

  - name: Composer
    command: composer
    args: ['-V', '2> /dev/null']

  - name: PHP Extensions
    command: php
    args: ['-m']
    exitCode: 0
    expectedOutput:
      - '(?i)apcu'
      - '(?i)bcmath'
      - '(?i)gd'
      - '(?i)int'
      - '(?i)pdo_mysql'
      - '(?i)pdo_pgsql'
      - '(?i)xsl'
      - '(?i)zip'

fileExistenceTests:
  - name: SSH configuration
    path: /etc/ssh/ssh_config.d/10-strict-hostkeys.conf
    shouldExist: true

  - name: FrankenPHP configuration
    path: /etc/frankenphp/site.caddyfile
    shouldExist: true

  - name: PHP system configuration
    path: /usr/local/etc/php/php.ini
    shouldExist: true

  - name: PHP common configuration
    path: /usr/local/etc/php/conf.d/10-php.ini
    shouldExist: true

  - name: PHP dev configuration
    path: /usr/local/etc/php/conf.d/20-php-dev.ini
    shouldExist: true

  - name: PHP prod configuration
    path: /usr/local/etc/php/conf.d/20-php-prod.ini
    shouldExist: false

fileContentTests:
  - name: Caddy configuration
    path: /etc/frankenphp/Caddyfile
    expectedContents:
      - '(?m)^\s*debug\s*$'
      - '(?m)^\s*import\s+site\.caddyfile.*$'
      - '(?m)^\s*import\s+site\.d/\*\.caddyfile.*$'

  - name: PHP common configuration
    path: /usr/local/etc/php/conf.d/10-php.ini
    expectedContents: ['.*Core PHP configuration.*']

  - name: PHP dev configuration
    path: /usr/local/etc/php/conf.d/20-php-dev.ini
    expectedContents: ['.*Development-specific PHP configuration.*']
