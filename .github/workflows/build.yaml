name: Build FrankenPHP images

on:
    workflow_dispatch:

jobs:
    build:
        name: Build (${{ matrix.os }}, ${{ matrix.php }}-${{ matrix.variant.name }})
        runs-on: ubuntu-latest

        strategy:
            matrix:
                os: [trixie, alpine]
                php: [8.5]
                variant:
                    - name: dev
                      suffix: -dev
                      target: dev
                    - name: prod
                      suffix:
                      target: prod

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
              with:
                  driver: docker-container

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile.${{ matrix.os }}
                  push: true
                  build-args: |
                      PHP_VERSION=php${{ matrix.php }}
                  tags: |
                      gremo/frankenphp-symfony:${{ matrix.php }}-${{ matrix.os }}${{ matrix.variant.suffix }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
