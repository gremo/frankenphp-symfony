name: CI

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/ci.yaml
      - docker/**
      - Dockerfile.*
      - docker-bake.hcl

  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ci.yaml
      - docker/**
      - Dockerfile.*
      - docker-bake.hcl

  schedule:
    - cron: "0 6 * * 1"

  workflow_dispatch:

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🧮 Matrix
        id: matrix
        uses: docker/bake-action/subaction/matrix@v7
        with:
          target: test
          fields: args

  test:
    name: test (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: generate-matrix

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix || '[]') }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: 📦 Build for testing
        id: bake
        uses: docker/bake-action@v7
        with:
          targets: ${{ matrix.target }}
          load: true

      - name: 📋 Extract metadata
        id: meta
        run: |
          TARGET_NAME="${{ matrix.target }}"
          IMAGE_NAME="${{ fromJSON(steps.bake.outputs.metadata)[matrix.target]['image.name'] }}"
          PHP="${{ matrix.args.PHP_VERSION }}"
          OS="${{ matrix.args.OS }}"
          ENV="${{ matrix.args.ENV }}"

          echo "image=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "php=$PHP" >> $GITHUB_OUTPUT
          echo "os=$OS" >> $GITHUB_OUTPUT
          echo "env=$ENV" >> $GITHUB_OUTPUT

          echo "::group::Meta"
          echo "target=$TARGET_NAME"
          echo "image=$IMAGE_NAME"
          echo "php=$PHP"
          echo "os=$OS"
          echo "env=$ENV"
          echo "::endgroup::"

      - name: 🧪 Structure test container
        uses: plexsystems/container-structure-test-action@v0.3.0
        with:
          image: ${{ steps.meta.outputs.image }}
          config: tests/structure-${{ steps.meta.outputs.env }}.yaml

      - name: ▶️ Run container
        run: |
          docker run -d \
            --name smoke-test \
            -v "$GITHUB_WORKSPACE/tests/fixtures/app-${{ steps.meta.outputs.env }}:/app" \
            -p 80:80 -p 443:443 \
            ${{ steps.meta.outputs.image }}

      - name: 🧪 Smoke test container
        env:
          TIMEOUT: 60
        run: |
          echo "Waiting for HTTP endpoint..."

          START_TIME=$(date +%s)
          timeout ${TIMEOUT}s bash -c '
            until [ "$(curl -skL -o /dev/null -w "%{http_code}" http://localhost:80)" = "200" ]; do
              sleep 1
            done
          ' && {
            END_TIME=$(date +%s)
            ELAPSED=$((END_TIME - START_TIME))

            echo "✅ HTTP responded successfully after ${ELAPSED}s."
          } || {
            echo "❌ HTTP endpoint did not respond with 200 OK within ${TIMEOUT}s."
            docker logs smoke-test
            exit 1
          }

      - name: 🧹 Cleanup test container
        if: always()
        run: docker rm -f smoke-test || true

  release:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: 🚀 Build and push
        uses: docker/bake-action@v7
        with:
          targets: release
          push: true
          set: |
            *.labels.org.opencontainers.image.revision=${{ github.sha }}
